<!DOCTYPE html>
<html>
<head>
<title>YUKI Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Admin Panel</h1></header>

<section class="products">
<form id="productForm">
<input type="text" id="pName" placeholder="Product Name" required><br><br>
<input type="number" id="pPrice" placeholder="Price" required><br><br>
<input type="text" id="pImg" placeholder="Image path (images/name.jpg)" required><br><br>
<input type="text" id="pCat" placeholder="Category" required><br><br>
<button type="submit">Add Product</button>
</form>
</section>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

document.getElementById("productForm").addEventListener("submit",function(e){
e.preventDefault();

let name=document.getElementById("pName").value;
let price=parseInt(document.getElementById("pPrice").value);
let img=document.getElementById("pImg").value;
let category=document.getElementById("pCat").value;

products.push({name,price,img,category});
localStorage.setItem("products",JSON.stringify(products));
alert("Product Added!");
});
</script>

</body>
</html>
