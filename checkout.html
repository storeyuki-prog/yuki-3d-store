<!DOCTYPE html>
<html>
<head>
<title>YUKI Checkout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Checkout</h1></header>

<section class="products">
<form id="orderForm">
<input type="text" id="name" placeholder="Your Name" required><br><br>
<input type="text" id="phone" placeholder="Phone" required><br><br>
<textarea id="address" placeholder="Address" required></textarea><br><br>
<button type="submit">Place Order</button>
</form>
</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("orderForm").addEventListener("submit",function(e){
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let total=cart.reduce((a,b)=>a+b.price,0);

let message="Hello YUKI!%0A";
cart.forEach((item,i)=>{
message+=(i+1)+". "+item.name+" - "+item.price+" DA%0A";
});
message+="Total: "+total+" DA%0AName: "+name+"%0APhone: "+phone+"%0AAddress: "+address;

window.open("https://wa.me/213781833271?text="+message,"_blank");
});
</script>

</body>
</html>
