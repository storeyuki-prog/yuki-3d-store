<!DOCTYPE html>
<html>
<head>
    <title>YUKI Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>YUKI - Checkout</h1></header>

<section class="checkout-form">
<form id="orderForm">
<label>Name:</label><input type="text" id="name" required><br>
<label>Phone:</label><input type="text" id="phone" required><br>
<label>Address:</label><textarea id="address" required></textarea><br>
<button type="submit">Place Order via WhatsApp</button>
</form>
</section>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];

document.getElementById("orderForm").addEventListener("submit", function(e){
    e.preventDefault();
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    let message = `Hello YUKI!%0AOrder Details:%0A`;
    cart.forEach((item,index)=>{message+=`${index+1}. ${item.name} - ${item.price} DA%0A`});
    message += `Name: ${name}%0APhone: ${phone}%0AAddress: ${address}%0ATotal: ${cart.reduce((a,b)=>a+b.price,0)} DA`;

    window.open(`https://wa.me/213YOURNUMBER?text=${message}`,"_blank");
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
emailjs.init("HBhes7514m4xMcT06");

let cart = JSON.parse(localStorage.getItem('cart')) || [];

document.getElementById("orderForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let total = cart.reduce((a,b)=>a+b.price,0);

    let orderDetails = cart.map(item => 
        item.name + " - " + item.price + " DA"
    ).join(", ");

    emailjs.send("service_uj2nvv8", "template_h6nlm6i", {
        customer_name: name,
        customer_phone: phone,
        customer_address: address,
        order_details: orderDetails,
        total_price: total
    }).then(function(){
        alert("Order sent successfully! Check your email.");
        localStorage.removeItem("cart");
    }, function(error){
        alert("Error sending order.");
    });
});
</script>
</body>
</html>
